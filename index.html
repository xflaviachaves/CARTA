<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mensagem</title>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: Georgia, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .mensagem {
            background: white;
            padding: 30px;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .frase {
            margin-top: 20px;
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>

<div class="mensagem">
    <p>
        Às vezes, tudo o que precisamos é lembrar que o tempo é valioso e que cada momento importa.
        Aproveite o presente e siga em frente com confiança.
    </p>

    <div class="frase">
        "Não é que temos pouco tempo, mas desperdiçamos muito."
        <br>— Sêneca
    </div>
</div>

</body>
</html>
